name: 发布 S-UI

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "发布标签"
        required: true
        default: "v1.14.0-alpha.24"
        type: string

permissions:
  contents: write

env:
  NODE_VERSION: "22"
  BUILD_TAGS: "with_quic,with_grpc,with_utls,with_acme,with_gvisor,with_naive_outbound,badlinkname,tfogo_checklinkname0,with_tailscale"

jobs:
  release-linux-amd64:
    name: 构建并发布 Linux amd64
    runs-on: ubuntu-24.04
    steps:
      - name: 检出仓库
        uses: actions/checkout@v6.0.2
        with:
          submodules: recursive
          fetch-depth: 1

      - name: 规范化发布标签
        id: vars
        run: |
          TAG="${{ inputs.tag }}"
          case "$TAG" in
            v*) echo "tag=$TAG" >> "$GITHUB_OUTPUT" ;;
            *) echo "tag=v$TAG" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: 设置 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: 构建前端
        run: |
          set -e
          cd frontend
          npm ci
          npm run build
          rm -rf ../web/html/*
          cp -R dist/* ../web/html/

      - name: 设置 Go
        uses: actions/setup-go@v6
        with:
          cache: false
          go-version-file: go.mod

      - name: 安装 Linux 构建依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y clang lld file

      - name: 构建 s-ui
        run: |
          set -e
          export CGO_ENABLED=1
          export CC=clang
          export CXX=clang++
          go version
          go build -ldflags='-w -s -checklinkname=0 -extldflags "-fuse-ld=lld"' -tags "$BUILD_TAGS" -o sui main.go
          ./sui -v
          file sui
          ldd sui

      - name: 打包 Linux amd64
        run: |
          set -e
          mkdir s-ui
          cp sui s-ui/
          cp s-ui.service s-ui/
          cp s-ui.sh s-ui/
          tar -zcvf s-ui-linux-amd64.tar.gz s-ui

      - name: 发布到当前仓库 Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: s-ui ${{ steps.vars.outputs.tag }}
          target_commitish: ${{ github.sha }}
          fail_on_unmatched_files: true
          files: s-ui-linux-amd64.tar.gz
